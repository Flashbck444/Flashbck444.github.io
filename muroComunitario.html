<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;700&display=swap" rel="stylesheet">
<title>Mi muro - Flashbck</title>

<style>
  body {
    margin: 0;
    background: #121212;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    overflow-y: auto;
  }
  .barra-inferior {
    position: fixed;
    bottom: 0; 
    left: 0;
    width: 100%;
    height: 70px;
    background-color: #121212;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    padding-right: 20px;
    z-index: 1000;
  }
  button, input {
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    font-family: Arial;
    cursor: pointer;
  }
  #lienzo {
    display: block;
    margin-top: 70px;    
    margin-bottom: 70px;  
    background: transparent;
  }
</style>
</head>
<body>

<!-- Barra superior -->
<div style="
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 70px;
background-color: #121212;
color: white;
display: flex;
align-items: center;
justify-content: flex-end;
padding-right: 10px;
font-family: Arial;
z-index: 1000;
">
  <a href="index.html" style="color:white;text-decoration:none;font-family:'Oswald',sans-serif;margin-right:20px;">Inicio</a>
  <a href="guias.html" style="color:white;text-decoration:none;font-family:'Oswald',sans-serif;margin-right:20px;">Guías</a>
  <a href="muroComunitario.html" style="color:white;text-decoration:none;font-family:'Oswald',sans-serif;margin-right:20px;">Muro comunitario</a>
  <a href="muro.html" style="color:white;text-decoration:none;font-family:'Oswald',sans-serif;margin-right:20px;">Mi muro</a>
  <img src="FlashbckTag.png" style="width:140px;height:105px;border-radius:50%;">
</div>

<!-- Barra inferior -->
<div class="barra-inferior">
  <button onclick="guardarCanvas()">Guardar muro</button>
  <input type="file" id="subirFoto" accept="image/*" />
</div>

<canvas id="lienzo"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwmJBZB2_1Vv3JsQjwlwmHfUIT0ZliAO8",
  authDomain: "flashbck-5b9be.firebaseapp.com",
  projectId: "flashbck-5b9be",
  storageBucket: "flashbck-5b9be.firebasestorage.app",
  messagingSenderId: "347817184946",
  appId: "1:347817184946:web:3b6aab0a8193daadba03ab"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const canvas = document.getElementById("lienzo");
const ctx = canvas.getContext("2d");

const alturaBarraInferior = 70;

function ajustarCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - alturaBarraInferior;
}
ajustarCanvas();
window.addEventListener("resize", ajustarCanvas);

// ----------------- IMÁGENES -----------------
const imagenes = [];
let imgSeleccionada = null;
let offsetX = 0;
let offsetY = 0;
let redimensionando = false;
let corner = null;
let startResizeX = 0;
let startResizeY = 0;
const umbralResize = 45;

function dibujarCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  imagenes.forEach(obj => ctx.drawImage(obj.img, obj.x, obj.y, obj.width, obj.height));
  if(imgSeleccionada){
    const size = 10;
    ctx.fillStyle = "white";
    [[0,0],[1,0],[0,1],[1,1]].forEach(([dx,dy])=>{
      const cx = imgSeleccionada.x + dx*imgSeleccionada.width - size/2;
      const cy = imgSeleccionada.y + dy*imgSeleccionada.height - size/2;
      ctx.fillRect(cx,cy,size,size);
    });
  }
}

// Cargar imágenes desde Firebase
const muroRef = ref(db, "muro");
onValue(muroRef, snapshot => {
  imagenes.length = 0;
  const datos = snapshot.val();
  if(!datos) return;
  Object.entries(datos).forEach(([key, item])=>{
    const img = new Image();
    img.src = item.imagen;
    img.onload = () => {
      const w = item.width || img.width;
      const h = item.height || img.height;
      imagenes.push({img, x:item.x ?? 50, y:item.y ?? 0, width:w, height:h, key:key});
      dibujarCanvas();
    };
  });
});

// Subir foto
document.getElementById("subirFoto").addEventListener("change", e=>{
  const archivo = e.target.files[0];
  if(!archivo) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.src = ev.target.result;
    img.onload = ()=>{
      const maxWidth = 500;
      const maxHeight = 500;
      const ratio = Math.min(maxWidth/img.width, maxHeight/img.height, 1);
      const w = img.width*ratio;
      const h = img.height*ratio;
      const newRef = push(muroRef,{imagen:ev.target.result, fecha:Date.now(), x:50, y:0, width:w, height:h});
      imagenes.push({img, x:50, y:0, width:w, height:h, key:newRef.key});
      dibujarCanvas();
    };
  };
  reader.readAsDataURL(archivo);
});

// Detectar esquinas para redimensionar
function detectarEsquina(obj,x,y){
  const size = 10;
  const corners = [
    {x:obj.x,y:obj.y,name:"tl"},
    {x:obj.x+obj.width,y:obj.y,name:"tr"},
    {x:obj.x,y:obj.y+obj.height,name:"bl"},
    {x:obj.x+obj.width,y:obj.y+obj.height,name:"br"}
  ];
  for(let c of corners) if(x>=c.x-size && x<=c.x+size && y>=c.y-size && y<=c.y+size) return c.name;
  return null;
}

// Eliminar imagen con doble click
canvas.addEventListener("dblclick", e=>{
  const x = e.offsetX;
  const y = e.offsetY;
  for(let i=imagenes.length-1;i>=0;i--){
    const obj = imagenes[i];
    if(x>=obj.x && x<=obj.x+obj.width && y>=obj.y && y<=obj.y+obj.height){
      if(obj.key) remove(ref(db,"muro/"+obj.key));
      imagenes.splice(i,1);
      dibujarCanvas();
      return;
    }
  }
});

  <script type="module">
// ---------------- MOVER / REDIMENSIONAR PARA MOUSE Y TOUCH ----------------
function obtenerPosicion(e){
  let rect = canvas.getBoundingClientRect();
  let x = e.touches ? e.touches[0].clientX - rect.left : e.offsetX;
  let y = e.touches ? e.touches[0].clientY - rect.top : e.offsetY;
  return {x, y};
}

function iniciarMovimiento(e){
  e.preventDefault();
  const {x, y} = obtenerPosicion(e);
  corner = null;
  startResizeX = x;
  startResizeY = y;

  for(let i=imagenes.length-1;i>=0;i--){
    const obj = imagenes[i];
    const c = detectarEsquina(obj,x,y);
    if(c){ imgSeleccionada=obj; redimensionando=false; corner=c; return; }
    if(x>=obj.x && x<=obj.x+obj.width && y>=obj.y && y<=obj.y+obj.height){
      imgSeleccionada=obj; offsetX=x-obj.x; offsetY=y-obj.y; return;
    }
  }
}

function moverImagen(e){
  if(!imgSeleccionada) return;
  e.preventDefault();
  const {x, y} = obtenerPosicion(e);

  if(corner){
    const dx = x - startResizeX;
    const dy = y - startResizeY;
    if(!redimensionando && Math.sqrt(dx*dx + dy*dy) < umbralResize) return;
    redimensionando = true;
    const minSize = 20;
    switch(corner){
      case "tl": imgSeleccionada.width += imgSeleccionada.x - x; imgSeleccionada.height += imgSeleccionada.y - y; imgSeleccionada.x = x; imgSeleccionada.y = y; break;
      case "tr": imgSeleccionada.width = x - imgSeleccionada.x; imgSeleccionada.height += imgSeleccionada.y - y; imgSeleccionada.y = y; break;
      case "bl": imgSeleccionada.width += imgSeleccionada.x - x; imgSeleccionada.height = y - imgSeleccionada.y; imgSeleccionada.x = x; break;
      case "br": imgSeleccionada.width = x - imgSeleccionada.x; imgSeleccionada.height = y - imgSeleccionada.y; break;
    }
    if(imgSeleccionada.width < minSize) imgSeleccionada.width = minSize;
    if(imgSeleccionada.height < minSize) imgSeleccionada.height = minSize;
    startResizeX = x; startResizeY = y;
    dibujarCanvas();
    return;
  }

  imgSeleccionada.x = x - offsetX;
  imgSeleccionada.y = y - offsetY;

  // Mantener dentro del canvas
  if(imgSeleccionada.x < 0) imgSeleccionada.x = 0;
  if(imgSeleccionada.y < 0) imgSeleccionada.y = 0;
  if(imgSeleccionada.x + imgSeleccionada.width > canvas.width) imgSeleccionada.x = canvas.width - imgSeleccionada.width;
  if(imgSeleccionada.y + imgSeleccionada.height > canvas.height) imgSeleccionada.y = canvas.height - imgSeleccionada.height;

  dibujarCanvas();
}

function terminarMovimiento(e){
  if(imgSeleccionada && imgSeleccionada.key){
    update(ref(db,"muro/"+imgSeleccionada.key),{
      x: imgSeleccionada.x,
      y: imgSeleccionada.y,
      width: imgSeleccionada.width,
      height: imgSeleccionada.height
    });
  }
  imgSeleccionada = null;
  redimensionando = false;
  corner = null;
}

// Eventos mouse
canvas.addEventListener("mousedown", iniciarMovimiento);
canvas.addEventListener("mousemove", moverImagen);
canvas.addEventListener("mouseup", terminarMovimiento);

// Eventos touch
canvas.addEventListener("touchstart", iniciarMovimiento, {passive:false});
canvas.addEventListener("touchmove", moverImagen, {passive:false});
canvas.addEventListener("touchend", terminarMovimiento);

// ---------------- GUARDAR CANVAS ----------------
function guardarCanvas(){
  // Descargar imagen local
  const link = document.createElement("a");
  link.download = "muro.png";
  link.href = canvas.toDataURL();
  link.click();

  // Guardar en Firebase
  const dataURL = canvas.toDataURL("image/png");
  push(muroRef, {
    imagen: dataURL,
    fecha: Date.now(),
    x:0,
    y:0,
    width: canvas.width,
    height: canvas.height
  }).then(()=>console.log("Muro guardado en Firebase ✅"))
    .catch(err=>console.error("Error guardando en Firebase:", err));
}
</script>
</body>
</html>
