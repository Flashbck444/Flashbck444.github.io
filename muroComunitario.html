<!DOCTYPE html>
<html lang="es">
<head>
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;700&display=swap" rel="stylesheet">
  <title>Mi muro - Flashbck</title>

  <style>
    body {
  margin: 0;
  background: #121212;
  color: white;
  font-family: Arial;
  overflow-x: hidden;
  overflow-y: auto;
}
    .barra-inferior {
  position: fixed;
  bottom: 0; 
  left: 0;
  width: 100%;
  height: 70px;
  background-color: #121212;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  padding-right: 20px;
  z-index: 1000;
}

    button, input {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-family: Arial;
    }

    #lienzo {
  display: block;
  margin-top: 70px;    
  margin-bottom: 70px;  
  cursor: crosshair;
  background: transparent;
}

    #galeria {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .post {
      background: #1d1d1d;
      border-radius: 16px;
      padding: 10px;
    }

    .post img {
      width: 100%;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <!-- Barra superior -->
    <div style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background-color: #121212;
    color: white;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    font-family: Arial;
    z-index: 1000;
    ">
        <a href="index.html" style="
    color:white;
    text-decoration:none;
    font-family: 'Oswald', sans-serif;
    margin-right: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
">
    Inicio
  </a>
        <a href="guias.html" style="
    color:white;
    text-decoration:none;
    font-family: 'Oswald', sans-serif;
    margin-right: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
">
    Guías
</a>
<a href="muroComunitario.html" style="
    color:white;
    text-decoration:none;
    font-family: 'Oswald', sans-serif;
    margin-right: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
">
    Muro comunitario
</a>
<a href="muro.html" style="
    color:white;
    text-decoration:none;
    font-family: 'Oswald', sans-serif;
    margin-right: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
">
    Mi muro
</a>
    <img src="FlashbckTag.png" style="
            width: 140px;
            height: 105px;
            border-radius: 50%;
        ">
    </div>

  <div class="barra-inferior">
  <button onclick="guardarDibujo()">Guardar dibujo</button>
  <input type="file" id="subirFoto" accept="image/*" />
</div>

  <canvas id="lienzo"></canvas>
  <div id="galeria"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // Firebase
    const firebaseConfig = {
  apiKey: "AIzaSyBwmJBZB2_1Vv3JsQjwlwmHfUIT0ZliAO8",
  authDomain: "flashbck-5b9be.firebaseapp.com",
  projectId: "flashbck-5b9be",
  storageBucket: "flashbck-5b9be.firebasestorage.app",
  messagingSenderId: "347817184946",
  appId: "1:347817184946:web:3b6aab0a8193daadba03ab"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById("lienzo");
    const ctx = canvas.getContext("2d");
    const galeria = document.getElementById("galeria");

    function ajustarCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 70 - 70;
}

    ajustarCanvas();
    window.addEventListener("resize", ajustarCanvas);

    let dibujando = false;

    canvas.addEventListener("mousedown", () => dibujando = true);

    canvas.addEventListener("mouseup", () => {
      dibujando = false;
      ctx.beginPath();
    });

    canvas.addEventListener("mousemove", (e) => {
      if (!dibujando) return;

      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.strokeStyle = "white";

      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    });

    window.guardarDibujo = function () {
  const data = canvas.toDataURL("image/png");

  push(ref(db, "muro"), {
    imagen: data,
    fecha: Date.now()
  });
};

    document.getElementById("subirFoto").addEventListener("change", function(e) {
  const archivo = e.target.files[0];
if (!archivo) return;
  const reader = new FileReader();

  reader.onload = function(ev) {
    push(ref(db, "muro"), {
      imagen: ev.target.result,
      fecha: Date.now()
    });
  };

  reader.readAsDataURL(archivo);
});

        function cargarMuro() {
  onValue(ref(db, "muro"), (snapshot) => {
    galeria.innerHTML = "";

    const datos = snapshot.val();
    if (!datos) return;

    Object.values(datos).reverse().forEach((item) => {
      const div = document.createElement("div");
      div.className = "post";
      div.innerHTML = `<img src="${item.imagen}">`;
      galeria.appendChild(div);
    });
  });
}

    cargarMuro();
  </script>
</body>
</html>
