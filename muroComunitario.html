<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwmJBZB2_1Vv3JsQjwlwmHfUIT0ZliAO8",
  authDomain: "flashbck-5b9be.firebaseapp.com",
  projectId: "flashbck-5b9be",
  storageBucket: "flashbck-5b9be.firebasestorage.app",
  messagingSenderId: "347817184946",
  appId: "1:347817184946:web:3b6aab0a8193daadba03ab"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const canvas = document.getElementById("lienzo");
const ctx = canvas.getContext("2d");

const alturaBarraInferior = 70;

function ajustarCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - alturaBarraInferior;
}
ajustarCanvas();
window.addEventListener("resize", ajustarCanvas);

// ----------------- IMÁGENES -----------------
const imagenes = [];
let imgSeleccionada = null;
let offsetX = 0;
let offsetY = 0;
let redimensionando = false;
let corner = null;
const umbralResize = 45;

function dibujarCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  imagenes.forEach(obj => ctx.drawImage(obj.img, obj.x, obj.y, obj.width, obj.height));
  if(imgSeleccionada){
    const size = 10;
    ctx.fillStyle = "white";
    [[0,0],[1,0],[0,1],[1,1]].forEach(([dx,dy])=>{
      const cx = imgSeleccionada.x + dx*imgSeleccionada.width - size/2;
      const cy = imgSeleccionada.y + dy*imgSeleccionada.height - size/2;
      ctx.fillRect(cx,cy,size,size);
    });
  }
}

// Cargar imágenes desde Firebase
const muroRef = ref(db, "muro");
onValue(muroRef, snapshot => {
  imagenes.length = 0;
  const datos = snapshot.val();
  if(!datos) return;
  Object.entries(datos).forEach(([key, item])=>{
    const img = new Image();
    img.src = item.imagen;
    img.onload = () => {
      const w = item.width || img.width;
      const h = item.height || img.height;
      imagenes.push({img, x:item.x ?? 50, y:item.y ?? 0, width:w, height:h, key:key});
      dibujarCanvas();
    };
  });
});

// Subir foto
document.getElementById("subirFoto").addEventListener("change", e=>{
  const archivo = e.target.files[0];
  if(!archivo) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.src = ev.target.result;
    img.onload = ()=>{
      const maxWidth = 500;
      const maxHeight = 500;
      const ratio = Math.min(maxWidth/img.width, maxHeight/img.height, 1);
      const w = img.width*ratio;
      const h = img.height*ratio;
      const newRef = push(muroRef,{imagen:ev.target.result, fecha:Date.now(), x:50, y:0, width:w, height:h});
      imagenes.push({img, x:50, y:0, width:w, height:h, key:newRef.key});
      dibujarCanvas();
    };
  };
  reader.readAsDataURL(archivo);
});

// Detectar esquinas para redimensionar
function detectarEsquina(obj,x,y){
  const size = 10;
  const corners = [
    {x:obj.x,y:obj.y,name:"tl"},
    {x:obj.x+obj.width,y:obj.y,name:"tr"},
    {x:obj.x,y:obj.y+obj.height,name:"bl"},
    {x:obj.x+obj.width,y:obj.y+obj.height,name:"br"}
  ];
  for(let c of corners) if(x>=c.x-size && x<=c.x+size && y>=c.y-size && y<=c.y+size) return c.name;
  return null;
}

// Mover y redimensionar imágenes
let startResizeX=0,startResizeY=0;

canvas.addEventListener("mousedown", e=>{
  const x = e.offsetX;
  const y = e.offsetY;
  corner = null;
  startResizeX = x;
  startResizeY = y;

  for(let i=imagenes.length-1;i>=0;i--){
    const obj = imagenes[i];
    const c = detectarEsquina(obj,x,y);
    if(c){ imgSeleccionada=obj; redimensionando=false; corner=c; return; }
    if(x>=obj.x && x<=obj.x+obj.width && y>=obj.y && y<=obj.y+obj.height){ 
      imgSeleccionada=obj; offsetX=x-obj.x; offsetY=y-obj.y; return; 
    }
  }
});

canvas.addEventListener("mousemove", e=>{
  const x = e.offsetX;
  const y = e.offsetY;
  if(corner && imgSeleccionada){
    const dx = x-startResizeX;
    const dy = y-startResizeY;
    if(!redimensionando && Math.sqrt(dx*dx+dy*dy)<umbralResize) return;
    redimensionando = true;
    const minSize=20;
    switch(corner){
      case "tl": imgSeleccionada.width+=imgSeleccionada.x-x; imgSeleccionada.height+=imgSeleccionada.y-y; imgSeleccionada.x=x; imgSeleccionada.y=y; break;
      case "tr": imgSeleccionada.width=x-imgSeleccionada.x; imgSeleccionada.height+=imgSeleccionada.y-y; imgSeleccionada.y=y; break;
      case "bl": imgSeleccionada.width+=imgSeleccionada.x-x; imgSeleccionada.height=y-imgSeleccionada.y; imgSeleccionada.x=x; break;
      case "br": imgSeleccionada.width=x-imgSeleccionada.x; imgSeleccionada.height=y-imgSeleccionada.y; break;
    }
    if(imgSeleccionada.width<minSize) imgSeleccionada.width=minSize;
    if(imgSeleccionada.height<minSize) imgSeleccionada.height=minSize;
    startResizeX=x; startResizeY=y;
    dibujarCanvas();
    return;
  }
  if(imgSeleccionada && !corner){
    imgSeleccionada.x = x - offsetX;
    imgSeleccionada.y = y - offsetY;
    if(imgSeleccionada.x<0) imgSeleccionada.x=0;
    if(imgSeleccionada.y<0) imgSeleccionada.y=0;
    if(imgSeleccionada.x+imgSeleccionada.width>canvas.width) imgSeleccionada.x=canvas.width-imgSeleccionada.width;
    if(imgSeleccionada.y+imgSeleccionada.height>canvas.height) imgSeleccionada.y=canvas.height-imgSeleccionada.height;
    dibujarCanvas();
  }
});

canvas.addEventListener("mouseup", ()=>{
  if(imgSeleccionada && imgSeleccionada.key){
    update(ref(db,"muro/"+imgSeleccionada.key),{x:imgSeleccionada.x,y:imgSeleccionada.y,width:imgSeleccionada.width,height:imgSeleccionada.height});
  }
  imgSeleccionada=null;
  redimensionando=false;
  corner=null;
});

// Eliminar imagen con doble click
canvas.addEventListener("dblclick", e=>{
  const x = e.offsetX;
  const y = e.offsetY;
  for(let i=imagenes.length-1;i>=0;i--){
    const obj = imagenes[i];
    if(x>=obj.x && x<=obj.x+obj.width && y>=obj.y && y<=obj.y+obj.height){
      if(obj.key) remove(ref(db,"muro/"+obj.key));
      imagenes.splice(i,1);
      dibujarCanvas();
      return;
    }
  }
});

// -----------------------------------
// GUARDAR CANVAS
// -----------------------------------
function guardarCanvas(){
  // 1️⃣ Descargar imagen local
  const link = document.createElement("a");
  link.download="muro.png";
  link.href=canvas.toDataURL();
  link.click();

  // 2️⃣ Guardar en Firebase
  guardarCanvasEnFirebase();
}

function guardarCanvasEnFirebase(){
  const dataURL = canvas.toDataURL("image/png");
  push(muroRef, {
    imagen: dataURL,
    fecha: Date.now(),
    x:0,
    y:0,
    width: canvas.width,
    height: canvas.height
  }).then(()=>{
    console.log("Muro guardado en Firebase exitosamente ✅");
  }).catch(err=>{
    console.error("Error guardando en Firebase:", err);
  });
}
</script>
