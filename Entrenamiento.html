<div id="controls">
  <div>
    <label>Intervalo (segundos): </label>
    <input type="number" id="intervalInput" value="2" min="1">
  </div>
  <div>
    <label>Cantidad de palabras: </label>
    <input type="number" id="countInput" value="3" min="1">
  </div>
  <button onclick="startWords()">Iniciar</button>
</div>

<div id="centerContainer"></div>

<script>
  let words = [];

  fetch("https://raw.githubusercontent.com/mazyvan/most-common-spanish-words/master/most-common-spanish-words.txt")
  .then(response => response.text())
  .then(text => {
    words = text
      .split("\n")                  // separar por líneas
      .flatMap(w => w.split("|"))  // separar si vienen con |
      .map(w => w.trim())          // quitar espacios
      .filter(w => w.length > 3);  // evitar palabras muy cortas
  });

  let intervalId = null;

  function getRandomWord() {
    if (words.length === 0) return "Cargando...";
    return words[Math.floor(Math.random() * words.length)];
  }

  function createWords() {
    const container = document.getElementById("centerContainer");
    const count = parseInt(document.getElementById("countInput").value);

    container.innerHTML = "";

    for (let i = 0; i < count; i++) {
      const word = document.createElement("div");
      word.className = "word";
      word.innerText = getRandomWord();

      container.appendChild(word);
    }
  }

  function startWords() {
    const seconds = parseFloat(document.getElementById("intervalInput").value);

    // Mostrar las palabras de inmediato
    createWords();

    if (intervalId) {
      clearInterval(intervalId);
    }

    // Cambiar palabras cada X segundos
    intervalId = setInterval(createWords, seconds * 1000);
  }
</script>
