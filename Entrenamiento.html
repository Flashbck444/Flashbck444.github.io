<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Palabras aleatorias</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
    }

    #controls {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
    }

    #centerContainer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      text-align: center;
      width: 80%;
    }

    .word {
      font-size: 24px;
      animation: fade 3s linear forwards;
    }

    @keyframes fade {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.5); }
    }
  </style>
</head>
<body>

<div id="controls">
  <div>
    <label>Intervalo (segundos): </label>
    <input type="number" id="intervalInput" value="2" min="1">
  </div>
  <div>
    <label>Cantidad de palabras: </label>
    <input type="number" id="countInput" value="3" min="1">
  </div>
  <button onclick="startWords()">Iniciar</button>
</div>

<div id="centerContainer"></div>

<script>
  const words = [
    "Hola", "Mundo", "Código", "Vector", "Banach",
    "Espacio", "Matemáticas", "Azar", "Pantalla", "Creatividad"
  ];

  let intervalId = null;

  function getRandomWord() {
    return words[Math.floor(Math.random() * words.length)];
  }

  function createWords() {
    const container = document.getElementById("centerContainer");
    const count = parseInt(document.getElementById("countInput").value);

    // Limpiar palabras anteriores
    container.innerHTML = "";

    for (let i = 0; i < count; i++) {
      const word = document.createElement("div");
      word.className = "word";
      word.innerText = getRandomWord();

      // Color aleatorio
      word.style.color = `hsl(${Math.random() * 360}, 100%, 70%)`;

      container.appendChild(word);

      // Eliminar después de animación
      setTimeout(() => {
        word.remove();
      }, 3000);
    }
  }

  function startWords() {
    const seconds = parseFloat(document.getElementById("intervalInput").value);

    if (intervalId) {
      clearInterval(intervalId);
    }

    intervalId = setInterval(createWords, seconds * 1000);
  }
</script>

</body>
</html>
